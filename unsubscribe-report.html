<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Auto-Unsubscribe Report</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7f4;
      --text: #202124;
      --muted: #686b70;
      --line: #dad7ce;
      --accent: #0b6b5d;
      --panel: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #171817;
        --text: #f2f0ea;
        --muted: #b8b5aa;
        --line: #3a3a35;
        --accent: #70d7c5;
        --panel: #20211f;
      }
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      letter-spacing: 0;
    }
    .updated {
      color: var(--muted);
      margin-bottom: 28px;
    }
    section {
      margin-top: 34px;
    }
    h2 {
      margin: 0 0 14px;
      font-size: 22px;
      letter-spacing: 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--line);
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    th {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    a {
      color: var(--accent);
      text-decoration-thickness: 1px;
    }
    .empty {
      color: var(--muted);
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 14px 16px;
    }
    .subject {
      max-width: 520px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Auto-Unsubscribe Report</h1>
    <div class="updated">Updated 2026-06-26T06:31:08+00:00</div>
    <section>
      <h2>Unsubscribed 😎</h2>
      <div class="empty">No successful unsubscriptions in the last 7 days.</div>
    </section>
    <section>
      <h2>Needs Manual Review 🤖</h2>
      <div class="empty">No entries need manual review.</div>
    </section>
    <section>
      <h2>Unsubscription Archive 💀</h2>
      <div class="empty">No completed unsubscriptions yet.</div>
    </section>
    <section>
      <h2>Ignored</h2>
      <div class="empty">No ignored senders.</div>
    </section>
  </main>
</body>
</html>
